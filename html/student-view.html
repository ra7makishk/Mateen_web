<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>صفحتي — برنامج متين العلمي</title>
  <link href="../libs/fonts/arabic-fonts.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/student-view.css"/>
  <link rel="stylesheet" href="../css/islamic.css">
  <link rel="stylesheet" href="../css/mobile.css">
  <link href="../css/responsive-fix.css" rel="stylesheet"/>
</head>
<body>
<!-- BASMALA -->
<div class="basmala-bar"><span class="bsm-ornament">❦</span>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ<span class="bsm-ornament">❦</span></div>

<!-- Auth Gate -->
<div id="authGate" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;background:var(--beige);">
  <img src="../logo.png" alt="متين" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);">
  <div style="font-family:Amiri,serif;font-size:16px;color:var(--green-dark)">جارٍ التحميل...</div>
</div>
<div id="mainContent" style="display:none">

<div class="page-wrap">

  <!-- Header -->
  <div class="sv-header">
    <div class="sv-logo" style="display:flex;align-items:center;gap:10px"><img src="../logo.png" alt="متين" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold);background:#fff;"> برنامج متين العلمي</div>
    <div class="sv-name-wrap">
      <div class="sv-name" id="studentName" style="display:none">...</div>
      <div class="sv-status" id="studentStatus" style="display:none"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="statPresent">0</div>
      <div class="stat-label">حاضرة</div>
    </div>
    <div class="stat-card absent">
      <div class="stat-num" id="statAbsent">0</div>
      <div class="stat-label">غائبة</div>
    </div>
    <div class="stat-card pct">
      <div class="stat-num" id="statPct">—</div>
      <div class="stat-label">نسبة الحضور</div>
    </div>

  </div>

  <div class="main-grid">

    <!-- Attendance -->
    <div class="card">
      <div class="card-head" style="display:flex;align-items:center;justify-content:space-between;">
        <span>📅 سجل الحضور</span>
        <button id="newSessionBtn"
          style="display:none;padding:6px 14px;background:var(--green-dark);color:white;border:none;
                 border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer;gap:4px;
                 align-items:center;">
          <i class="ti ti-plus"></i> تسجيل غياب
        </button>
      </div>

      <!-- فورم تسجيل الغياب -->
      <div id="newSessionForm" style="display:none;background:var(--beige);border-radius:10px;padding:14px;margin:12px 0;border:1px solid var(--border);">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
          <div>
            <label style="font-size:12px;color:var(--text-mid);display:block;margin-bottom:4px;">التاريخ</label>
            <input id="sessDate" type="date"
              style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;
                     font-family:inherit;font-size:13px;box-sizing:border-box;">
          </div>
          <div>
            <label style="font-size:12px;color:var(--text-mid);display:block;margin-bottom:4px;">اليوم</label>
            <input id="sessDay" type="text" placeholder="الاثنين"
              style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;
                     font-family:inherit;font-size:13px;box-sizing:border-box;">
          </div>
        </div>
        <div id="sessSubjects" style="margin-bottom:12px;"></div>
        <div style="display:flex;gap:8px;">
          <button id="saveSessionBtn"
            style="flex:1;padding:9px;background:var(--green-dark);color:white;border:none;
                   border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:600;">
            <i class="ti ti-device-floppy"></i> حفظ
          </button>
          <button onclick="document.getElementById('newSessionForm').style.display='none'"
            style="padding:9px 16px;border:1px solid var(--border);background:white;border-radius:8px;
                   font-family:inherit;font-size:13px;cursor:pointer;">
            إلغاء
          </button>
        </div>
      </div>

      <div id="attendanceList" class="attendance-list">
        <div class="empty-msg">لا توجد جلسات مسجلة بعد</div>
      </div>
    </div>

    <div class="side-col">

      <!-- Notes -->
      <div class="card" id="notesCard" style="display:none">
        <div class="card-head">🗒️ ملاحظات</div>
        <div id="notesContent" class="notes-content"></div>
      </div>

    </div>
  </div>

  <div class="footer">برنامج متين العلمي المستوى الثاني</div>

</div>

</div><!-- end mainContent -->

<script type="module" src="../js/student-view.js"></script>
  <script type="module" src="../js/notifications.js"></script>
  <script src="../js/sw-register.js"></script>
</body>
</html>
