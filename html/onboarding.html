<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مرحباً بك — متين</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Naskh Arabic', serif;
  background: linear-gradient(160deg, #fdf8f0 0%, #ede0cc 50%, #d4b896 100%);
  min-height: 100vh;
  overflow: hidden;
}

/* ── Slides Container ── */
.ob-wrap {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* ── Progress dots ── */
.ob-dots {
  position: absolute; top: 18px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 7px; z-index: 10;
}
.ob-dot {
  width: 8px; height: 8px; border-radius: 20px;
  background: rgba(92,61,46,0.2);
  transition: all 0.35s ease;
}
.ob-dot.active { width: 24px; background: #c9a227; }

/* ── Skip ── */
.ob-skip {
  position: absolute; top: 14px; left: 18px; z-index: 10;
  background: none; border: none;
  color: #8a6a52; font-family: inherit; font-size: 13px;
  cursor: pointer; padding: 6px 10px;
}

/* ── Slides ── */
.ob-slides {
  flex: 1; display: flex;
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
.ob-slide {
  min-width: 100vw; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 28px 20px;
  text-align: center;
  gap: 0;
}

/* ── Illustration ── */
.ob-illus {
  width: 180px; height: 180px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  position: relative;
  flex-shrink: 0;
}
.ob-illus::before {
  content: '';
  position: absolute; inset: -8px;
  border-radius: 50%;
  border: 2px dashed rgba(201,162,39,0.4);
  animation: spin 12s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.ob-icon { font-size: 72px; line-height: 1; }

/* ── Text ── */
.ob-title {
  font-family: Amiri, serif;
  font-size: 26px; font-weight: 700;
  color: #2c1a0e;
  margin-bottom: 12px;
  line-height: 1.4;
}
.ob-desc {
  font-size: 14px; color: #6b4c2a;
  line-height: 2; max-width: 320px;
  margin-bottom: 24px;
}

/* ── Steps (للتثبيت) ── */
.ob-steps {
  display: flex; flex-direction: column; gap: 10px;
  width: 100%; max-width: 320px; margin-bottom: 20px;
}
.ob-step {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(201,162,39,0.25);
  border-radius: 12px; padding: 11px 14px;
  text-align: right;
}
.ob-step-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #5c3d2e, #8a5e3c);
  color: #e8c96a; font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ob-step-text { font-size: 13px; color: #2c1a0e; line-height: 1.5; }

/* ── Bottom ── */
.ob-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 24px 36px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to top, rgba(237,224,204,0.95) 60%, transparent);
}
.ob-btn-next {
  background: linear-gradient(135deg, #2c1a0e, #5c3d2e);
  color: #e8c96a; border: none; border-radius: 14px;
  padding: 13px 32px; font-family: inherit; font-size: 15px;
  font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 6px 20px rgba(44,26,14,0.3);
  transition: opacity 0.2s;
}
.ob-btn-next:active { opacity: 0.85; }
.ob-btn-prev {
  background: rgba(92,61,46,0.1); color: #5c3d2e;
  border: 1px solid rgba(92,61,46,0.2); border-radius: 12px;
  padding: 11px 20px; font-family: inherit; font-size: 14px;
  cursor: pointer; transition: opacity 0.2s;
}
.ob-btn-prev:active { opacity: 0.7; }
.ob-btn-prev.hidden { visibility: hidden; }

/* ── Role badge ── */
.role-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(201,162,39,0.15);
  border: 1px solid rgba(201,162,39,0.35);
  color: #7a5c2e; border-radius: 20px;
  padding: 5px 16px; font-size: 13px;
  margin-bottom: 16px;
}

/* ── Color per slide ── */
.s-welcome .ob-illus { background: linear-gradient(135deg, #fff8ee, #f0dfc0); }
.s-install .ob-illus { background: linear-gradient(135deg, #fff8ee, #f0dfc0); }
.s-notif   .ob-illus { background: linear-gradient(135deg, #fff8ee, #f0dfc0); }
.s-student .ob-illus { background: linear-gradient(135deg, #eef8f0, #c8e6d0); }
.s-teacher .ob-illus { background: linear-gradient(135deg, #fff4e6, #ffd9a0); }
.s-super   .ob-illus { background: linear-gradient(135deg, #f0eeff, #d4ccff); }
.s-admin   .ob-illus { background: linear-gradient(135deg, #fff0f0, #ffd0d0); }
</style>
</head>
<body>

<div class="ob-wrap">
  <!-- Progress dots -->
  <div class="ob-dots" id="obDots"></div>

  <!-- Skip -->
  <button class="ob-skip" onclick="finish()">تخطي</button>

  <!-- Slides -->
  <div class="ob-slides" id="obSlides"></div>

  <!-- Bottom nav -->
  <div class="ob-bottom">
    <button class="ob-btn-prev hidden" id="btnPrev" onclick="prevSlide()">
      <i class="ti ti-arrow-right"></i> السابق
    </button>
    <button class="ob-btn-next" id="btnNext" onclick="nextSlide()">
      التالي <i class="ti ti-arrow-left"></i>
    </button>
  </div>
</div>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { FIREBASE_CONFIG } from "./config.js";

const app  = getApps().length ? getApp() : initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── شاشات مشتركة ──────────────────────────────────────────────────
const commonSlides = [
  {
    cls: 's-welcome',
    icon: '🕌',
    title: 'أهلاً بك في متين',
    desc: 'منصة تعليمية إسلامية أصيلة\nمن القرآن والسنة',
  },
  {
    cls: 's-install',
    icon: '📲',
    title: 'أضيفي التطبيق لهاتفك',
    desc: 'للوصول السريع في أي وقت بدون متصفح',
    steps: [
      { n:'1', t: 'اضغطي زر المشاركة ⬆️ في Safari' },
      { n:'2', t: 'اختاري "أضف إلى الشاشة الرئيسية"' },
      { n:'3', t: 'اضغطي "إضافة" ✅' },
    ],
    isIOS: true,
  },
  {
    cls: 's-notif',
    icon: '🔔',
    title: 'فعّلي الإشعارات',
    desc: 'لتصلك آخر الأخبار والرسائل فوراً',
    notifBtn: true,
  },
];

// ── شاشات حسب الدور ──────────────────────────────────────────────
const roleSlides = {
  mateen: [
    { cls:'s-student', icon:'📚', title:'جدولك الدراسي', desc:'تابعي مواعيد دروسك\nوموادك الأسبوعية بسهولة' },
    { cls:'s-student', icon:'✅', title:'حضورك ودرجاتك', desc:'اطّلعي على سجل حضورك\ودرجاتك في كل مادة' },
    { cls:'s-student', icon:'💬', title:'الرسائل', desc:'تواصلي مع معلماتك\nعبر نظام الرسائل' },
  ],
  teacher: [
    { cls:'s-teacher', icon:'👩‍🏫', title:'صفحتك كمعلمة', desc:'اطّلعي على ملفك الشخصي\nوجدولك الدراسي' },
    { cls:'s-teacher', icon:'📋', title:'طالباتك', desc:'تابعي تقدم طالباتك\nوسجلاتهن' },
    { cls:'s-teacher', icon:'💬', title:'الرسائل', desc:'تواصلي مع الطالبات\nوالإدارة' },
  ],
  supervisor: [
    { cls:'s-super', icon:'📊', title:'لوحة المشرفة', desc:'سجّلي الغياب اليومي\nلكل الطالبات' },
    { cls:'s-super', icon:'📝', title:'الملاحظات', desc:'أضيفي ملاحظات\nعلى كل طالبة' },
  ],
  admin: [
    { cls:'s-admin', icon:'👑', title:'لوحة الإدارة', desc:'أدّيري الطالبات والمعلمات\nوكل إعدادات المنصة' },
    { cls:'s-admin', icon:'📣', title:'الأخبار والإعلانات', desc:'انشري آخر الأخبار\nللجميع' },
  ],
};

let slides = [];
let current = 0;

onAuthStateChanged(auth, async user => {
  let role = 'student';
  if (user) {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) role = snap.data().role || 'student';
  }

  // ابني الشاشات
  slides = [...commonSlides, ...(roleSlides[role] || roleSlides.mateen)];

  // فلتر شاشة iOS لو مش iOS
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (!isIOS) slides = slides.filter(s => !s.isIOS);

  buildSlides(role);
  buildDots();
  updateNav();
});

function buildSlides(role) {
  const container = document.getElementById('obSlides');
  const roleLabel = role === 'mateen' ? 'بنات متين' :
                    role === 'teacher' ? 'معلمة' :
                    role === 'supervisor' ? 'مشرفة' :
                    role === 'admin' ? 'إدارية' : '';

  container.innerHTML = slides.map((s, i) => `
    <div class="ob-slide ${s.cls}">
      <div class="ob-illus">
        <span class="ob-icon">${s.icon}</span>
      </div>
      ${i === 1 && roleLabel ? `<div class="role-badge">✦ ${roleLabel} ✦</div>` : ''}
      <div class="ob-title">${s.title}</div>
      <div class="ob-desc">${s.desc.replace(/\n/g,'<br>')}</div>
      ${s.steps ? `
        <div class="ob-steps">
          ${s.steps.map(st => `
            <div class="ob-step">
              <div class="ob-step-num">${st.n}</div>
              <div class="ob-step-text">${st.t}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
      ${s.notifBtn ? `
        <button onclick="window.askNotif()" style="
          background:linear-gradient(135deg,#c9a227,#e8c96a);
          color:#2c1a0e; border:none; border-radius:12px;
          padding:12px 28px; font-family:inherit; font-size:14px;
          font-weight:700; cursor:pointer; margin-bottom:8px;
          box-shadow:0 4px 14px rgba(201,162,39,0.3);
        ">🔔 تفعيل الإشعارات</button>
        <div style="font-size:12px;color:#9b8470;">يمكنك تخطي هذه الخطوة</div>
      ` : ''}
    </div>
  `).join('');
}

function buildDots() {
  const dots = document.getElementById('obDots');
  dots.innerHTML = slides.map((_,i) =>
    `<div class="ob-dot ${i===0?'active':''}" id="dot${i}"></div>`
  ).join('');
}

window.nextSlide = () => {
  if (current < slides.length - 1) {
    current++;
    updateSlider();
  } else {
    finish();
  }
};

window.prevSlide = () => {
  if (current > 0) { current--; updateSlider(); }
};

function updateSlider() {
  document.getElementById('obSlides').style.transform = `translateX(${current * 100}vw)`;
  document.querySelectorAll('.ob-dot').forEach((d,i) => {
    d.classList.toggle('active', i === current);
  });
  updateNav();
}

function updateNav() {
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');
  prev.classList.toggle('hidden', current === 0);
  next.innerHTML = current === slides.length - 1
    ? 'ابدأي <i class="ti ti-rocket"></i>'
    : 'التالي <i class="ti ti-arrow-left"></i>';
}

window.finish = () => {
  localStorage.setItem('ob_done', '1');
  window.location.href = 'home.html';
};

window.askNotif = async () => {
  if ('Notification' in window) {
    await Notification.requestPermission();
  }
  nextSlide();
};
</script>
</body>
</html>
