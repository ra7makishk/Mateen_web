<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مرحباً بك — متين</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/common.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Naskh Arabic', serif;
  background: linear-gradient(160deg, #fdf8f0 0%, #ede0cc 50%, #d4b896 100%);
  min-height: 100vh; overflow: hidden; direction: rtl;
}
.ob-wrap { width:100vw; height:100vh; display:flex; flex-direction:column; position:relative; overflow:hidden; }
.ob-dots { position:absolute; top:18px; left:50%; transform:translateX(-50%); display:flex; gap:7px; z-index:10; }
.ob-dot { width:8px; height:8px; border-radius:20px; background:rgba(92,61,46,0.2); transition:all 0.35s; }
.ob-dot.active { width:24px; background:#c9a227; }
.ob-skip { position:absolute; top:14px; left:18px; z-index:10; background:none; border:none; color:#8a6a52; font-family:inherit; font-size:13px; cursor:pointer; padding:6px 10px; }
.ob-slides { flex:1; display:flex; transition:transform 0.45s cubic-bezier(0.4,0,0.2,1); }
.ob-slide { min-width:100vw; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 28px 100px; text-align:center; }
.ob-illus { width:170px; height:170px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:24px; background:linear-gradient(135deg,#2c1a0e,#5c3d2e); position:relative; flex-shrink:0; border:3px solid #c9a227; box-shadow:0 8px 30px rgba(44,26,14,0.35); }
.ob-illus::before { content:''; position:absolute; inset:-10px; border-radius:50%; border:2px dashed rgba(201,162,39,0.3); animation:spin 12s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.ob-icon { font-size:68px; line-height:1; }
.ob-title { font-family:Amiri,serif; font-size:26px; font-weight:700; color:#2c1a0e; margin-bottom:10px; line-height:1.4; }
.ob-desc { font-size:14px; color:#6b4c2a; line-height:2; max-width:320px; margin-bottom:20px; }
.ob-steps { display:flex; flex-direction:column; gap:10px; width:100%; max-width:320px; margin-bottom:16px; }
.ob-step { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.6); border:1px solid rgba(201,162,39,0.25); border-radius:12px; padding:11px 14px; text-align:right; }
.ob-step-num { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#5c3d2e,#8a5e3c); color:#e8c96a; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.ob-step-text { font-size:13px; color:#2c1a0e; line-height:1.5; }
.ob-bottom { position:absolute; bottom:0; left:0; right:0; padding:20px 24px 36px; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(to top,rgba(237,224,204,0.95) 60%,transparent); }
.ob-btn-next { background:linear-gradient(135deg,#2c1a0e,#5c3d2e); color:#e8c96a; border:none; border-radius:14px; padding:13px 32px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; box-shadow:0 6px 20px rgba(44,26,14,0.3); }
.ob-btn-prev { background:rgba(92,61,46,0.1); color:#5c3d2e; border:1px solid rgba(92,61,46,0.2); border-radius:12px; padding:11px 20px; font-family:inherit; font-size:14px; cursor:pointer; }
.ob-btn-prev.hidden { visibility:hidden; }
.role-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(201,162,39,0.15); border:1px solid rgba(201,162,39,0.35); color:#7a5c2e; border-radius:20px; padding:5px 16px; font-size:13px; margin-bottom:14px; }
.notif-btn { background:linear-gradient(135deg,#c9a227,#e8c96a); color:#2c1a0e; border:none; border-radius:12px; padding:12px 28px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(201,162,39,0.3); margin-bottom:8px; }
.notif-skip { font-size:12px; color:#9b8470; cursor:pointer; background:none; border:none; font-family:inherit; }
</style>
</head>
<body>
<div class="ob-wrap">
  <div class="ob-dots" id="obDots"></div>
  <button class="ob-skip" onclick="finish()">تخطي</button>
  <div class="ob-slides" id="obSlides"></div>
  <div class="ob-bottom">
    <button class="ob-btn-prev hidden" id="btnPrev" onclick="prevSlide()">&#8594; السابق</button>
    <button class="ob-btn-next" id="btnNext" onclick="nextSlide()">التالي &#8592;</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ── Firebase Config ──────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBwfnxMm3sCDnfr6sWlmN3_5R5kbA9L0tA",
  authDomain: "mateen-a122d.firebaseapp.com",
  projectId: "mateen-a122d",
  storageBucket: "mateen-a122d.appspot.com",
  messagingSenderId: "246666624444",
  appId: "1:246666624444:web:0d9b3e3f3f3f3f3f3f3f3f"
};
</script>
<script type="module" src="../js/config.js"></script>
<script>
// ── Slides ───────────────────────────────────────────────────
const ROLE_SLIDES = {
  mateen: [
    { icon:'📚', title:'جدولك الدراسي', desc:'تابعي مواعيد دروسك\nوموادك الأسبوعية بسهولة' },
    { icon:'✅', title:'حضورك ودرجاتك', desc:'اطّلعي على سجل حضورك\nودرجاتك في كل مادة' },
    { icon:'💬', title:'الرسائل', desc:'تواصلي مع معلماتك\nعبر نظام الرسائل' },
  ],
  teacher: [
    { icon:'👩‍🏫', title:'صفحتك كمعلمة', desc:'اطّلعي على ملفك الشخصي\nوجدولك الدراسي' },
    { icon:'📋', title:'طالباتك', desc:'تابعي تقدم طالباتك\nوسجلاتهن' },
    { icon:'💬', title:'الرسائل', desc:'تواصلي مع الطالبات\nوالإدارة' },
  ],
  supervisor: [
    { icon:'📊', title:'لوحة المشرفة', desc:'سجّلي الغياب اليومي\nلكل الطالبات' },
    { icon:'📝', title:'الملاحظات', desc:'أضيفي ملاحظات\nعلى كل طالبة' },
  ],
  admin: [
    { icon:'👑', title:'لوحة الإدارة', desc:'أدّيري الطالبات والمعلمات\nوكل إعدادات المنصة' },
    { icon:'📣', title:'الأخبار والإعلانات', desc:'انشري آخر الأخبار\nللجميع' },
  ],
};

const ROLE_LABELS = { mateen:'بنات متين', teacher:'معلمة', supervisor:'مشرفة', admin:'إدارية' };

let slides = [];
let current = 0;

function buildAllSlides(role) {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const base = [
    { icon:'<img src="../logo.png" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #c9a227;">', title:'أهلاً بك في متين', desc:'منصة تعليمية إسلامية أصيلة\nمن القرآن والسنة' },
    ...(isIOS ? [{
      icon:'📲', title:'أضيفي التطبيق لهاتفك',
      desc:'للوصول السريع في أي وقت بدون متصفح',
      steps:['اضغطي زر المشاركة ⬆️ في Safari','اختاري "أضف إلى الشاشة الرئيسية"','اضغطي "إضافة" ✅'],
    }] : []),
    { icon:'🔔', title:'فعّلي الإشعارات', desc:'لتصلك آخر الأخبار والرسائل فوراً', notif:true },
  ];
  slides = [...base, ...(ROLE_SLIDES[role] || ROLE_SLIDES.mateen)];
  renderSlides(role);
  renderDots();
  updateNav();
}

function renderSlides(role) {
  const label = ROLE_LABELS[role] || '';
  document.getElementById('obSlides').innerHTML = slides.map((s,i) => `
    <div class="ob-slide">
      <div class="ob-illus"><span class="ob-icon" style="display:flex;align-items:center;justify-content:center;">${s.icon}</span></div>
      ${i===0 && label ? `<div class="role-badge">✦ ${label} ✦</div>` : ''}
      <div class="ob-title">${s.title}</div>
      <div class="ob-desc">${(s.desc||'').replace(/\n/g,'<br>')}</div>
      ${s.steps ? `<div class="ob-steps">${s.steps.map((t,n)=>`
        <div class="ob-step"><div class="ob-step-num">${n+1}</div><div class="ob-step-text">${t}</div></div>
      `).join('')}</div>` : ''}
      ${s.notif ? `
        <button class="notif-btn" onclick="askNotif()">🔔 تفعيل الإشعارات</button>
        <button class="notif-skip" onclick="nextSlide()">تخطي</button>
      ` : ''}
    </div>
  `).join('');
}

function renderDots() {
  document.getElementById('obDots').innerHTML = slides.map((_,i)=>
    `<div class="ob-dot ${i===0?'active':''}" id="dot${i}"></div>`
  ).join('');
}

function nextSlide() {
  if (current < slides.length-1) { current++; updateSlider(); }
  else finish();
}

function prevSlide() {
  if (current > 0) { current--; updateSlider(); }
}

function updateSlider() {
  document.getElementById('obSlides').style.transform = `translateX(${current*100}vw)`;
  document.querySelectorAll('.ob-dot').forEach((d,i)=>d.classList.toggle('active',i===current));
  updateNav();
}

function updateNav() {
  document.getElementById('btnPrev').classList.toggle('hidden', current===0);
  document.getElementById('btnNext').textContent = current===slides.length-1 ? 'ابدأي 🚀' : 'التالي ←';
}

function finish() {
  localStorage.setItem('ob_done','1');
  const role = localStorage.getItem('userRole') || 'mateen';
  if (role === 'teacher') {
    const subject = localStorage.getItem('userSubject') || '';
    window.location.href = subject ? `teacher-${subject}.html` : 'home.html';
  } else {
    window.location.href = 'home.html';
  }
}

function askNotif() {
  if ('Notification' in window) Notification.requestPermission();
  nextSlide();
}

// ── تحديد الدور ──────────────────────────────────────────────
// انتظر Firebase Auth
function waitForAuth() {
  return new Promise(resolve => {
    const check = setInterval(() => {
      if (window.firebase) {
        clearInterval(check);
        resolve();
      }
    }, 100);
    setTimeout(() => { clearInterval(check); resolve(); }, 3000);
  });
}

(async () => {
  // جرب تجيبي الدور من localStorage لو محفوظ
  const cachedRole = localStorage.getItem('userRole');
  if (cachedRole) {
    buildAllSlides(cachedRole);
    return;
  }

  // لو مش محفوظ — شغّلي بدون دور
  buildAllSlides('mateen');
})();
</script>
</body>
</html>
